<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Chiron - Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #2c3e50; /* Ton bleu foncé */
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            background: rgba(44, 62, 80, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
        }
        
        nav { display: flex; gap: 30px; }

        .nav-link { 
            text-decoration: none; 
            color: #ffffff; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            opacity: 0.7;
            transition: 0.3s;
        }
        
        .nav-link:hover { opacity: 1; letter-spacing: 3px; }

        .contact-container {
            width: 90%;
            max-width: 650px;
            text-align: center;
            animation: fadeIn 1.5s ease-in;
        }

        h2 { 
            font-size: 2rem; 
            font-weight: 300; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
        }

        .contact-box {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
        }

        .contact-info {
            margin-bottom: 40px;
        }

        .contact-info p {
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
        }

        .email-link {
            display: inline-block;
            margin-top: 20px;
            color: #2c3e50;
            background: #ffffff;
            padding: 14px 35px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .email-link:hover {
            background: #3498db;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
        }

        .social-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .social-links a:hover {
            opacity: 1;
            color: #3498db;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { margin-top: 60px; opacity: 0.3; font-size: 0.75rem; letter-spacing: 1px; }

        @media (max-width: 768px) {
            nav { gap: 15px; }
            .nav-link { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="https://chiron-site.github.io/Portfolio-accueil-Louis-Chiron/" class="nav-link">Accueil</a>
            <a href="https://chiron-site.github.io/Portfolio-photographie-Louis-Chiron/" class="nav-link">Photographie</a>
            <a href="https://chiron-site.github.io/Portfolio-videos-Louis-Chiron/" class="nav-link">Affiches</a>
            <a href="https://chiron-site.github.io/Portfolio-videos-Louis-Chiron/" class="nav-link">Vidéos</a>
            <a href="https://chiron-site.github.io/Portfolio-web-Louis-Chiron/" class="nav-link">Web</a>
            <a href="https://chiron-site.github.io/Portfolio-contact-Louis-Chiron/" class="nav-link">Contact</a>
        </nav>
    </header>

    <div class="contact-container">
        <h2>Me Contacter</h2>
        
        <div class="contact-box">
            <div class="contact-info">
                <p>Une question ou un projet de collaboration ?</p>
                <p>N'hésitez pas à m'envoyer un message.</p>
                
                <a href="mailto:louis_chiron@icloud.com" class="email-link">Envoyer un mail</a>
            </div>

            <div class="social-links">
                <a href="https://instagram.com/ton_compte" target="_blank">Instagram</a>
                <a href="https://www.youtube.com/channel/UC_sBheo_TxHa7WUK301RWgg" target="_blank">YouTube</a>
                <a href="#" target="_blank">LinkedIn</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Louis Chiron — Portfolio</p>
    </footer>

</body>
</html>
