<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louis Chiron - Contact</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #2c3e50;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            background: rgba(44, 62, 80, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
        }
        
        nav { display: flex; gap: 30px; }

        .nav-link { 
            text-decoration: none; 
            color: #ffffff; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            opacity: 0.7;
            transition: 0.3s;
        }
        
        .nav-link:hover { opacity: 1; letter-spacing: 3px; }

        .contact-container {
            width: 90%;
            max-width: 650px;
            text-align: center;
            animation: fadeIn 1.5s ease-in;
        }

        h2 { 
            font-size: 2rem; 
            font-weight: 300; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
        }

        /* IMAGE AU DESSUS */
        .profile-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin: 0 auto 30px auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.3);
        }

        .contact-box {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
        }

        .contact-info p {
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .email-link {
            display: inline-block;
            color: #2c3e50;
            background: #ffffff;
            padding: 14px 30px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .email-link:hover {
            background: #3498db;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-link {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
        }

        .social-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .social-links a:hover {
            opacity: 1;
            color: #3498db;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { 
            margin-top: 60px; 
            opacity: 0.3; 
            font-size: 0.75rem; 
            letter-spacing: 1px; 
        }

        @media (max-width: 768px) {
            nav { gap: 15px; }
            .nav-link { font-size: 0.7rem; }
            .button-group { flex-direction: column; width: 100%; }
            .email-link { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="https://chiron-site.github.io/Portfolio-accueil-Louis-Chiron/" class="nav-link">Accueil</a>
            <a href="https://chiron-site.github.io/Portfolio-photographie-Louis-Chiron/" class="nav-link">Photographie</a>
            <a href="https://chiron-site.github.io/Portfolio-videos-Louis-Chiron/" class="nav-link">Affiches</a>
            <a href="https://chiron-site.github.io/Portfolio-videos-Louis-Chiron/" class="nav-link">Vidéos</a>
            <a href="https://chiron-site.github.io/Portfolio-web-Louis-Chiron/" class="nav-link">Web</a>
            <a href="https://chiron-site.github.io/Portfolio-contact-Louis-Chiron/" class="nav-link">Contact</a>
        </nav>
    </header>

    <div class="contact-container">
        <h2>Me Contacter</h2>

        <!-- IMAGE AU DESSUS DU RECTANGLE -->
        <div class="profile-wrapper">
            <img src="https://new.express.adobe.com/webpage/TsLCb6f4qSFm9/resources/12698685-0282-423d-9a2b-ee50758fb853-img_5165_jpe?asset_id=27f41b39-a1e3-42d4-b1d2-f637a9bcea0a&img_etag=%2225d55fa965a34515ab03a92c42bc6e3b%22&image_assets=false&size=1024" alt="Louis Chiron" class="profile-img">
        </div>
        
        <div class="contact-box">
            <div class="contact-info">
                <p>Une question ou un projet ?</p>
                <p>N'hésitez pas à m'envoyer un mail.</p>
                
                <div class="button-group">
                    <a href="mailto:lchiron@outlook.com" class="email-link">Envoyer un mail</a>
                    <a href="https://chiron-site.github.io/Portfolio-contact-carte-Louis-Chiron/" class="email-link card-link">Voir ma Carte</a>
                </div>
            </div>

            <div class="social-links">
                <a href="https://www.instagram.com/i_got_it_picture/" target="_blank">Instagram</a>
                <a href="https://www.youtube.com/channel/UC_sBheo_TxHa7WUK301RWgg" target="_blank">YouTube</a>
                <a href="https://fr.linkedin.com/in/louis-chiron-6b1ab6296" target="_blank">LinkedIn</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Louis Chiron — Portfolio</p>
    </footer>

</body>
</html>
